<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>注册 · SenseNova</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: var(--ink-100); }
  .auth-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .auth-hero {
    background: radial-gradient(ellipse at top right, hsl(211 20% 10%) 0%, hsl(211 25% 8%) 70%);
    color: white; padding: 64px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .auth-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 70% 30%, hsla(211, 86%, 48%, 0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-hero .brand { color: white; font-size: 20px; position: relative; z-index: 1; }
  .auth-hero h1 { color: white; font-size: 40px; position: relative; z-index: 1; }
  .auth-hero p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 380px; position: relative; z-index: 1; }

  .bonus-list { position: relative; z-index: 1; margin-top: 24px; padding: 0; }
  .bonus-list li {
    list-style: none; padding: 10px 0;
    color: rgba(255, 255, 255, 0.85); font-size: 14px;
    display: flex; gap: 12px;
  }
  .bonus-list li::before { content: '✓'; color: var(--brand); font-weight: 700; }

  .auth-form-wrap {
    background: white; padding: 48px 64px;
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto;
  }
  .auth-form { width: 100%; max-width: 440px; }
  .auth-form h2 { font-size: 28px; margin-bottom: 8px; }
  .auth-form .sub { color: var(--ink-500); font-size: 14px; margin-bottom: 24px; }

  .auth-foot {
    text-align: center; margin-top: 20px;
    font-size: 14px; color: var(--ink-500);
  }
  .auth-foot a { color: var(--brand); font-weight: 500; }

  .verify-tip {
    background: #F0FDF4;
    border: 1px solid #BBF7D0;
    color: #065F46;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-top: 14px;
  }

  .phone-input {
    display: flex;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .phone-input:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .phone-input .cc {
    border: none;
    background: var(--ink-100);
    padding: 0 12px;
    font-size: 14px;
    color: var(--ink-700);
    border-right: 1px solid var(--ink-200);
  }
  .phone-input input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
  }

  .sms-group {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .sms-btn {
    padding: 10px 14px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: white;
    color: var(--brand);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .sms-btn:hover { background: var(--brand-soft); border-color: var(--brand); }

  .strength { height: 4px; background: var(--ink-200); border-radius: 4px; margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; width: 60%; background: linear-gradient(90deg, #F59E0B, #10B981); }

  @media (max-width: 900px) {
    .auth-page { grid-template-columns: 1fr; }
    .auth-hero { display: none; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-hero">
    <a class="brand" href="index.html">
      <span class="brand-mark"></span>
      SenseNova
    </a>

    <div>
      <h1>开启你的<br/><span style="background: linear-gradient(135deg, var(--brand) 0%, hsl(200 80% 55%) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">AI 之旅</span></h1>
      <p>在 30 秒内创建 SenseNova 账号，立即体验生产级大模型 API 服务。</p>

      <ul class="bonus-list">
        <li>公测期完全免费开放</li>
        <li>即刻获得 API Key，兼容 OpenAI SDK</li>
        <li>每模型 1,500 次调用 / 5 小时（同账户所有 Key 共享）· 模型全开放</li>
        <li>解锁 Playground 在线测试</li>
      </ul>
    </div>

    <div class="text-small" style="color: rgba(255,255,255,0.4);">
      我们遵循 SOC2 标准，你的数据始终受到保护。
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <h2>创建账号</h2>
      <p class="sub">立即接入，5 分钟接入生产</p>

      <form onsubmit="event.preventDefault(); alert('注册成功！欢迎来到 SenseNova 🎉'); location.href='console/dashboard.html';">
        <div class="form-field">
          <label>手机号</label>
          <div class="phone-input">
            <select class="cc">
              <option>+86</option>
              <option>+852</option>
              <option>+65</option>
              <option>+60</option>
              <option>+1</option>
            </select>
            <input type="tel" placeholder="请输入手机号" required/>
          </div>
          <div class="helper">我们将发送验证码短信到此手机号</div>
        </div>

        <div class="form-field">
          <label>短信验证码</label>
          <div class="sms-group">
            <input class="input" type="text" placeholder="6 位验证码" required/>
            <button type="button" class="sms-btn">发送验证码</button>
          </div>
        </div>

        <div class="form-field">
          <label>设置密码</label>
          <input class="input" type="password" placeholder="至少 8 位，含字母与数字" required/>
          <div class="strength"><div class="strength-fill"></div></div>
          <div class="helper">密码强度：中等 · 建议添加特殊字符</div>
        </div>

        <label class="flex" style="font-size:13px; color: var(--ink-700); margin: 4px 0 20px; align-items: flex-start;">
          <input type="checkbox" required style="margin-top: 2px;"/>
          <span>
            我已阅读并同意 <a href="#" style="color:var(--brand);">服务条款</a> 与 <a href="#" style="color:var(--brand);">隐私政策</a>
          </span>
        </label>

        <button type="submit" class="btn btn-primary btn-block btn-lg">创建账号 · 免费开始</button>

        <div class="verify-tip">
          🎁 注册成功即可使用 · 公测期完全免费开放
        </div>
      </form>

      <p class="auth-foot">
        已有账号？<a href="login.html">立即登录</a>
      </p>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
