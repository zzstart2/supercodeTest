<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-zh="登录 · SenseNova" data-en="Sign in · SenseNova">登录 · SenseNova</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: var(--ink-100); }

  /* 与 register 统一的左右分栏 */
  .auth-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .auth-hero {
    background: radial-gradient(ellipse at top right, hsl(211 20% 10%) 0%, hsl(211 25% 8%) 70%);
    color: white; padding: 64px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .auth-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 70% 30%, hsla(211, 86%, 48%, 0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-hero .brand { color: white; font-size: 20px; position: relative; z-index: 1; }
  .auth-hero h1 { color: white; font-size: 40px; position: relative; z-index: 1; margin: 0 0 12px; }
  .auth-hero p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 380px; position: relative; z-index: 1; margin: 0; }

  .bonus-list { position: relative; z-index: 1; margin-top: 24px; padding: 0; }
  .bonus-list li {
    list-style: none; padding: 10px 0;
    color: rgba(255, 255, 255, 0.85); font-size: 14px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .bonus-list li .ico { color: var(--brand); flex-shrink: 0; margin-top: 3px; }

  .auth-form-wrap {
    background: white; padding: 48px 64px;
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto;
  }
  .auth-form { width: 100%; max-width: 440px; }
  .auth-form h2 { font-size: 28px; margin-bottom: 8px; }
  .auth-form .sub { color: var(--ink-500); font-size: 14px; margin-bottom: 24px; }

  .auth-foot {
    text-align: center; margin-top: 20px;
    font-size: 14px; color: var(--ink-500);
  }
  .auth-foot a { color: var(--brand); font-weight: 500; }

  /* Tab 切换（密码/验证码） */
  .login-tabs {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--ink-200);
  }
  .login-tabs .t {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-500);
    padding: 0 0 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color var(--dur) var(--ease);
  }
  .login-tabs .t:hover { color: var(--ink-700); }
  .login-tabs .t.active {
    color: var(--brand);
    font-weight: 600;
    border-bottom-color: var(--brand);
  }

  /* 统一输入框风格（与 register.html 对齐） */
  .phone-input {
    display: flex;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .phone-input:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .phone-input .cc {
    border: none;
    background: var(--ink-100);
    padding: 0 12px;
    font-size: 14px;
    color: var(--ink-700);
    border-right: 1px solid var(--ink-200);
  }
  .phone-input input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    min-width: 0;
  }

  .pwd-wrap {
    position: relative;
    display: flex;
    align-items: center;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .pwd-wrap:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .pwd-wrap input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    background: transparent;
    min-width: 0;
  }
  .pwd-wrap .field-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-400);
    padding: 8px 12px;
    display: flex;
    align-items: center;
  }
  .pwd-wrap .field-icon:hover { color: var(--ink-700); }

  .sms-group {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .sms-group .input-with-cc {
    display: flex;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .sms-group .input-with-cc:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .sms-group .input-with-cc input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    background: transparent;
    min-width: 0;
  }
  .sms-btn {
    padding: 10px 14px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: white;
    color: var(--brand);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: all var(--dur) var(--ease);
  }
  .sms-btn:hover { background: var(--brand-soft); border-color: var(--brand); }

  .forget-link {
    display: block;
    text-align: right;
    font-size: 13px;
    color: var(--ink-500);
    margin: -8px 0 16px;
    text-decoration: none;
  }
  .forget-link:hover { color: var(--brand); }

  .login-agreement {
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-400);
    line-height: 1.7;
  }
  .login-agreement a { color: var(--brand); text-decoration: none; }

  /* 右上角语言切换 */
  .auth-utilbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }

  @media (max-width: 900px) {
    .auth-page { grid-template-columns: 1fr; }
    .auth-hero { display: none; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-hero">
    <a class="brand" href="index.html">
      <span class="brand-mark"></span>
      SenseNova
    </a>

    <div>
      <h1 data-zh="欢迎回来" data-en="Welcome back">欢迎回来</h1>
      <p data-zh="登录 SenseNova 控制台，继续管理你的 API Key、查看用量并调试模型。" data-en="Sign in to the SenseNova Console to manage your API Keys, track usage, and run models.">登录 SenseNova 控制台，继续管理你的 API Key、查看用量并调试模型。</p>

      <ul class="bonus-list">
        <li><svg class="ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span data-zh="兼容 OpenAI SDK，一键替换 base_url" data-en="Drop-in OpenAI SDK compatibility — just swap base_url">兼容 OpenAI SDK，一键替换 base_url</span></li>
        <li><svg class="ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span data-zh="控制台实时监控 Token 用量与成功率" data-en="Live token usage and success-rate monitoring">控制台实时监控 Token 用量与成功率</span></li>
        <li><svg class="ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span data-zh="Playground 在线调试参数与 Prompt" data-en="Tune parameters and prompts in the online Playground">Playground 在线调试参数与 Prompt</span></li>
      </ul>
    </div>

    <div class="text-small" style="color: rgba(255,255,255,0.4);" data-zh="我们遵循 SOC2 标准，你的数据始终受到保护。" data-en="We follow SOC2 standards — your data is always protected.">
      我们遵循 SOC2 标准，你的数据始终受到保护。
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <div class="auth-utilbar">
        <button type="button" class="lang-toggle" onclick="toggleLang()">EN</button>
      </div>

      <h2 data-zh="登录" data-en="Sign in">登录</h2>
      <p class="sub" data-zh="使用手机号密码或短信验证码登录" data-en="Sign in with your phone + password, or use an SMS code">使用手机号密码或短信验证码登录</p>

      <div class="login-tabs">
        <div class="t active" onclick="switchMode(this,'pw')" data-zh="密码登录" data-en="Password">密码登录</div>
        <div class="t" onclick="switchMode(this,'sms')" data-zh="验证码登录" data-en="SMS code">验证码登录</div>
      </div>

      <form onsubmit="event.preventDefault(); location.href='console/dashboard.html';">

        <!-- 密码模式 -->
        <div id="pw-mode">
          <div class="form-field">
            <label data-zh="手机号" data-en="Phone number">手机号</label>
            <div class="phone-input">
              <select class="cc"><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" data-zh-placeholder="请输入手机号" data-en-placeholder="Enter your phone number" required/>
            </div>
          </div>

          <div class="form-field">
            <label data-zh="密码" data-en="Password">密码</label>
            <div class="pwd-wrap">
              <input type="password" placeholder="请输入密码" data-zh-placeholder="请输入密码" data-en-placeholder="Enter your password" id="pwd-input"/>
              <button type="button" class="field-icon" onclick="togglePwd()" aria-label="Toggle password visibility">
                <svg class="ico" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><path d="M3 21L21 3" id="pwd-slash" style="display:none;"/></svg>
              </button>
            </div>
          </div>

          <a class="forget-link" href="#" data-zh="忘记密码？" data-en="Forgot password?">忘记密码？</a>
        </div>

        <!-- 验证码模式 -->
        <div id="sms-mode" class="hidden">
          <div class="form-field">
            <label data-zh="手机号" data-en="Phone number">手机号</label>
            <div class="phone-input">
              <select class="cc"><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" data-zh-placeholder="请输入手机号" data-en-placeholder="Enter your phone number" required/>
            </div>
          </div>

          <div class="form-field">
            <label data-zh="短信验证码" data-en="SMS code">短信验证码</label>
            <div class="sms-group">
              <div class="input-with-cc">
                <input type="text" placeholder="请输入验证码" data-zh-placeholder="请输入验证码" data-en-placeholder="Enter verification code"/>
              </div>
              <button type="button" class="sms-btn" data-zh="发送验证码" data-en="Send code">发送验证码</button>
            </div>
          </div>

          <a class="forget-link" href="#" data-zh="忘记密码？" data-en="Forgot password?">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" data-zh="登 录" data-en="Sign in">登 录</button>

        <p class="login-agreement" data-zh-html="登录即代表您同意 SenseNova <a href=&quot;#&quot;>用户协议</a> 和 <a href=&quot;#&quot;>隐私政策</a>" data-en-html="By signing in you agree to SenseNova's <a href=&quot;#&quot;>Terms of Service</a> and <a href=&quot;#&quot;>Privacy Policy</a>">登录即代表您同意 SenseNova <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
      </form>

      <p class="auth-foot" data-zh-html="没有账号？<a href=&quot;register.html&quot;>立即注册</a>" data-en-html="Don't have an account? <a href=&quot;register.html&quot;>Sign up</a>">
        没有账号？<a href="register.html">立即注册</a>
      </p>
    </div>
  </div>
</div>

<script>
function switchMode(el, mode) {
  document.querySelectorAll('.login-tabs .t').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pw-mode').classList.toggle('hidden', mode !== 'pw');
  document.getElementById('sms-mode').classList.toggle('hidden', mode !== 'sms');
}
function togglePwd() {
  const inp = document.getElementById('pwd-input');
  const slash = document.getElementById('pwd-slash');
  if (inp.type === 'password') { inp.type = 'text'; slash.style.display = ''; }
  else { inp.type = 'password'; slash.style.display = 'none'; }
}
</script>
<script src="assets/app.js"></script>
</body>
</html>
