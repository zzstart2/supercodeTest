<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · SuperCode</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { margin: 0; background: #F0F2F5; }

  /* 全屏登录布局 */
  .login-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 480px;
    grid-template-rows: auto 1fr auto;
  }

  /* 顶栏 */
  .login-topbar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: transparent;
    position: relative;
    z-index: 2;
  }
  .login-topbar .brand {
    font-size: 18px;
  }

  /* 左侧视觉区 */
  .login-visual {
    grid-row: 1 / -1;
    grid-column: 1;
    background: linear-gradient(135deg, #FFF5F5 0%, #FEE2E2 30%, #FECACA 60%, #FCA5A5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .login-visual::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(228, 46, 46, 0.15) 0%, transparent 70%);
    top: 10%;
    left: 20%;
  }
  .login-visual::after {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 107, 74, 0.12) 0%, transparent 70%);
    bottom: 15%;
    right: 10%;
  }

  /* 抽象图形装饰 */
  .visual-shape {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 320px;
  }
  .shape-ring {
    position: absolute;
    border-radius: 50%;
    border: 3px solid rgba(228, 46, 46, 0.2);
  }
  .shape-ring:nth-child(1) { width: 300px; height: 300px; top: 10px; left: 60px; }
  .shape-ring:nth-child(2) { width: 200px; height: 200px; top: 60px; left: 20px; border-color: rgba(255, 107, 74, 0.25); }
  .shape-ring:nth-child(3) { width: 160px; height: 160px; top: 100px; left: 200px; border-color: rgba(228, 46, 46, 0.15); }
  .shape-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--brand);
    opacity: 0.6;
  }
  .shape-dot:nth-child(4) { top: 40px; left: 200px; }
  .shape-dot:nth-child(5) { top: 180px; left: 80px; width: 8px; height: 8px; opacity: 0.4; }
  .shape-dot:nth-child(6) { top: 260px; left: 300px; width: 16px; height: 16px; background: #FF6B4A; opacity: 0.5; }

  /* 右侧表单区 */
  .login-form-panel {
    grid-row: 2;
    grid-column: 2;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 56px;
  }
  .login-form {
    width: 100%;
    max-width: 360px;
  }
  .login-form h2 {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 32px;
    color: var(--ink-900);
  }

  /* Tab */
  .login-tabs {
    display: flex;
    gap: 28px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--ink-200);
  }
  .login-tabs .t {
    padding: 10px 0;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-500);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .login-tabs .t.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
  }

  /* 输入框 */
  .login-field {
    margin-bottom: 20px;
  }
  .login-input {
    width: 100%;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid var(--ink-200);
    font-size: 14px;
    color: var(--ink-900);
    background: transparent;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus {
    border-bottom-color: var(--brand);
  }
  .login-input::placeholder {
    color: var(--ink-400);
  }

  .login-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .login-row a {
    color: var(--brand);
    font-weight: 500;
  }

  .login-submit {
    width: 100%;
    padding: 14px;
    background: var(--brand);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .login-submit:hover {
    background: var(--brand-dark);
    transform: translateY(-1px);
  }

  .login-agree {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-400);
    text-align: center;
    line-height: 1.6;
  }
  .login-agree a { color: var(--brand); }

  .login-register {
    margin-top: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--ink-500);
  }
  .login-register a {
    color: var(--brand);
    font-weight: 600;
    text-decoration: underline;
  }

  .login-brand-footer {
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    border-top: 1px solid var(--ink-100);
  }
  .login-brand-footer .lbf-mark {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--brand), #FF6B4A);
    display: grid;
    place-items: center;
    color: white;
    font-weight: 700;
    font-size: 16px;
  }
  .login-brand-footer .lbf-text {
    font-size: 13px;
    color: var(--ink-500);
    line-height: 1.5;
  }

  /* 底部版权 */
  .login-copyright {
    grid-column: 1 / -1;
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: var(--ink-400);
    background: transparent;
  }

  /* SMS 输入组 */
  .sms-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
  }
  .sms-send {
    padding: 10px 16px;
    border: 1px solid var(--brand);
    color: var(--brand);
    background: white;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    margin-bottom: 1px;
  }
  .sms-send:hover {
    background: var(--brand-soft);
  }

  /* 手机号带区号 */
  .phone-row {
    display: flex;
    border-bottom: 1px solid var(--ink-200);
    transition: border-color 0.15s;
  }
  .phone-row:focus-within {
    border-bottom-color: var(--brand);
  }
  .phone-row select {
    border: none;
    background: transparent;
    font-size: 14px;
    color: var(--ink-700);
    padding: 12px 8px 12px 0;
    outline: none;
  }
  .phone-row input {
    flex: 1;
    border: none;
    padding: 12px 0;
    font-size: 14px;
    color: var(--ink-900);
    background: transparent;
    outline: none;
  }
  .phone-row input::placeholder { color: var(--ink-400); }

  @media (max-width: 900px) {
    .login-page { grid-template-columns: 1fr; }
    .login-visual { display: none; }
    .login-form-panel { grid-column: 1; padding: 40px 24px; }
    .login-topbar { grid-column: 1; }
    .login-copyright { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="login-page">
  <!-- 顶栏 -->
  <div class="login-topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      SuperCode
    </a>
  </div>

  <!-- 左侧视觉 -->
  <div class="login-visual">
    <div class="visual-shape">
      <div class="shape-ring"></div>
      <div class="shape-ring"></div>
      <div class="shape-ring"></div>
      <div class="shape-dot"></div>
      <div class="shape-dot"></div>
      <div class="shape-dot"></div>
    </div>
  </div>

  <!-- 右侧表单 -->
  <div class="login-form-panel">
    <div class="login-form">
      <h2>欢迎登录</h2>

      <div class="login-tabs">
        <div class="t active" onclick="switchLogin(this, 'pw')">密码登录</div>
        <div class="t" onclick="switchLogin(this, 'sms')">验证码登录</div>
      </div>

      <form onsubmit="event.preventDefault(); location.href='console/dashboard.html';">

        <!-- 密码模式 -->
        <div id="pw-mode">
          <div class="login-field">
            <div class="phone-row">
              <select>
                <option>+86</option>
                <option>+852</option>
                <option>+65</option>
                <option>+1</option>
              </select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="login-field">
            <input class="login-input" type="password" placeholder="请输入密码"/>
          </div>
          <div class="login-row">
            <span></span>
            <a href="#">忘记密码</a>
          </div>
        </div>

        <!-- 验证码模式 -->
        <div id="sms-mode" class="hidden">
          <div class="login-field">
            <div class="phone-row">
              <select>
                <option>+86</option>
                <option>+852</option>
                <option>+65</option>
                <option>+1</option>
              </select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="login-field">
            <div class="sms-row">
              <input class="login-input" type="text" placeholder="请输入验证码"/>
              <button type="button" class="sms-send">发送验证码</button>
            </div>
          </div>
        </div>

        <button type="submit" class="login-submit">登 录</button>
      </form>

      <p class="login-agree">
        登录即代表您同意 SuperCode <a href="#">用户协议</a> 和 <a href="#">隐私政策</a>
      </p>

      <p class="login-register">
        没有账号？ <a href="register.html">去注册</a>
      </p>

      <div class="login-brand-footer">
        <div class="lbf-mark">S</div>
        <div class="lbf-text">
          SuperCode 大模型 API 平台<br/>
          提供高效易用的全栈大模型服务
        </div>
      </div>
    </div>
  </div>

  <!-- 底部版权 -->
  <div class="login-copyright">
    Copyright © 2026 SuperCode AI Platform, Inc.
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  function switchLogin(el, mode) {
    document.querySelectorAll('.login-tabs .t').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sms-mode').classList.toggle('hidden', mode !== 'sms');
    document.getElementById('pw-mode').classList.toggle('hidden', mode !== 'pw');
  }
</script>
</body>
</html>
