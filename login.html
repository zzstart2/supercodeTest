<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · SuperCode</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

  /* 一、根容器 */
  .layout {
    position: relative;
    width: 100%;
    height: 100vh;
    background-color: #F5EFEE;
    overflow: hidden;
  }

  /* 六、左侧装饰区（全屏背景 + CSS 图形） */
  .layout-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  /* 流体丝带模拟 */
  .bg-ribbon {
    position: absolute;
    width: 800px;
    height: 320px;
    top: 22%;
    left: 4%;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.55) 0%,
      rgba(228,46,46,0.18) 25%,
      rgba(251,113,133,0.28) 45%,
      rgba(255,255,255,0.5) 60%,
      rgba(244,63,94,0.22) 80%,
      rgba(255,255,255,0.45) 100%);
    border-radius: 50% 40% 55% 45% / 55% 35% 65% 45%;
    filter: blur(35px);
    transform: rotate(-10deg);
    animation: ribFloat 9s ease-in-out infinite alternate;
  }
  .bg-ribbon2 {
    position: absolute;
    width: 600px;
    height: 240px;
    top: 35%;
    left: 12%;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.6) 0%,
      rgba(251,113,133,0.25) 35%,
      rgba(190,18,60,0.12) 55%,
      rgba(255,255,255,0.5) 100%);
    border-radius: 45% 55% 50% 50% / 50% 55% 45% 55%;
    filter: blur(28px);
    transform: rotate(7deg);
    animation: ribFloat2 11s ease-in-out infinite alternate;
  }
  @keyframes ribFloat  { 0% { transform: rotate(-10deg) translateY(0); } 100% { transform: rotate(-6deg) translateY(-18px); } }
  @keyframes ribFloat2 { 0% { transform: rotate(7deg) translateX(0); }  100% { transform: rotate(11deg) translateX(14px); } }

  /* 光晕 */
  .bg-orb {
    position: absolute;
    border-radius: 50%;
  }
  .bg-orb.a { width: 400px; height: 400px; top: 5%;  left: 8%;  background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 70%); }
  .bg-orb.b { width: 280px; height: 280px; bottom: 12%; left: 25%; background: radial-gradient(circle, rgba(228,46,46,0.1) 0%, transparent 70%); }
  .bg-orb.c { width: 200px; height: 200px; top: 48%;  left: 42%; background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%); }

  /* 细线环 */
  .bg-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
  }
  .bg-ring.r1 { width: 420px; height: 420px; top: 10%; left: 6%; }
  .bg-ring.r2 { width: 300px; height: 300px; top: 28%; left: 30%; border-color: rgba(228,46,46,0.12); }
  .bg-ring.r3 { width: 220px; height: 220px; bottom: 16%; left: 18%; border-color: rgba(255,255,255,0.22); }

  /* 光点 */
  .bg-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.65);
  }
  .bg-dot.d1 { width: 7px;  height: 7px;  top: 18%; left: 28%; }
  .bg-dot.d2 { width: 10px; height: 10px; top: 52%; left: 12%; background: rgba(228,46,46,0.3); }
  .bg-dot.d3 { width: 13px; height: 13px; top: 68%; left: 48%; background: rgba(251,113,133,0.35); }
  .bg-dot.d4 { width: 5px;  height: 5px;  top: 32%; left: 52%; }

  /* 二、顶部 Header */
  .layout-header {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 96px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px 0 60px;
    box-sizing: border-box;
  }
  .layout-header .brand { font-size: 18px; }

  /* 三、右侧登录面板 */
  .layout-content {
    position: absolute;
    right: 60px;
    top: 0;
    width: 468px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 5;
  }

  .content-card {
    width: 468px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0px 10px 120px 3px rgba(228, 46, 46, 0.08);
    padding: 70px 60px;
    box-sizing: border-box;
  }

  /* 四、卡片内部 */

  /* 4.1 标题 */
  .login-title {
    font-size: 24px;
    font-weight: 700;
    color: #404040;
    margin: 0 0 28px;
  }

  /* 4.2 Tab */
  .login-tabs {
    display: flex;
    gap: 24px;
    margin-bottom: 0;
    border-bottom: 1px solid #EAEAEA;
    padding-bottom: 0;
  }
  .login-tabs .t {
    font-size: 18px;
    font-weight: 400;
    color: #666;
    padding: 0 0 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .login-tabs .t.active {
    color: var(--brand);
    font-weight: 500;
    border-bottom-color: var(--brand);
  }

  /* 4.3 表单 */
  .login-form-area {
    padding-top: 28px;
  }
  .lf-field {
    margin-bottom: 0;
  }
  .lf-input-wrap {
    position: relative;
    border-bottom: 1px solid #d3ddec;
    display: flex;
    align-items: center;
    transition: border-color 0.15s;
  }
  .lf-input-wrap:focus-within {
    border-color: var(--brand);
  }
  .lf-input-wrap + .lf-input-wrap {
    margin-top: 8px;
  }
  .lf-input-wrap select {
    border: none;
    background: transparent;
    font-size: 14px;
    color: #404040;
    padding: 16px 6px 16px 0;
    outline: none;
  }
  .lf-input-wrap input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: #404040;
    padding: 16px 36px 16px 0;
    outline: none;
    min-width: 0;
  }
  .lf-input-wrap input::placeholder { color: #aab4c8; }
  .lf-input-wrap .field-icon {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #aab4c8;
    padding: 8px;
    display: flex;
    align-items: center;
  }
  .lf-input-wrap .field-icon:hover { color: #666; }

  /* 辅助链接行 */
  .lf-links {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    margin-bottom: 28px;
  }
  .lf-links a {
    font-size: 13px;
    color: #8F9AAF;
    text-decoration: none;
  }
  .lf-links a:hover { color: var(--brand); }
  .lf-links .forget {
    font-size: 14px;
    color: #566A7F;
  }

  /* SMS 验证码行 */
  .lf-sms-wrap {
    border-bottom: 1px solid #d3ddec;
    display: flex;
    align-items: center;
    transition: border-color 0.15s;
    margin-top: 8px;
  }
  .lf-sms-wrap:focus-within { border-color: var(--brand); }
  .lf-sms-wrap input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: #404040;
    padding: 16px 0;
    outline: none;
  }
  .lf-sms-wrap input::placeholder { color: #aab4c8; }
  .lf-sms-wrap .sms-send {
    padding: 6px 14px;
    border: 1px solid var(--brand);
    color: var(--brand);
    background: transparent;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  .lf-sms-wrap .sms-send:hover { background: var(--brand-soft); }

  /* 4.4 登录按钮 */
  .login-btn {
    width: 100%;
    height: 40px;
    border: none;
    border-radius: 4px;
    background: var(--brand);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-btn:hover { background: var(--brand-dark); }

  /* 4.5 协议 */
  .login-agreement {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: #aab4c8;
    line-height: 1.7;
  }
  .login-agreement a { color: var(--brand); text-decoration: none; }

  /* 4.6 注册引导 */
  .login-register {
    margin-top: 30px;
    text-align: center;
    font-size: 14px;
    color: #666;
  }
  .login-register a { color: var(--brand); font-weight: 600; text-decoration: underline; }

  /* 4.7 产品推广条 */
  .login-promo {
    margin-top: 24px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding-top: 20px;
    border-top: 1px solid #F0F0F0;
  }
  .login-promo .promo-mark {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--brand), #FF6B4A);
    display: grid;
    place-items: center;
    color: white;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .login-promo .promo-text {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    max-width: 260px;
  }

  /* 五、底部 Footer */
  .layout-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    font-size: 12px;
    color: #aab4c8;
  }

  /* 响应式 */
  @media (max-width: 960px) {
    .layout-bg { display: none; }
    .layout { background: #fff; overflow-y: auto; }
    .layout-content {
      position: static;
      width: 100%;
      height: auto;
      padding: 20px;
    }
    .content-card {
      width: 100%;
      max-width: 468px;
      margin: 0 auto;
      box-shadow: none;
    }
    .layout-footer { position: static; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- 六、左侧装饰背景 -->
  <div class="layout-bg">
    <div class="bg-ribbon"></div>
    <div class="bg-ribbon2"></div>
    <div class="bg-orb a"></div>
    <div class="bg-orb b"></div>
    <div class="bg-orb c"></div>
    <div class="bg-ring r1"></div>
    <div class="bg-ring r2"></div>
    <div class="bg-ring r3"></div>
    <div class="bg-dot d1"></div>
    <div class="bg-dot d2"></div>
    <div class="bg-dot d3"></div>
    <div class="bg-dot d4"></div>
  </div>

  <!-- 二、顶部 Header -->
  <header class="layout-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      SuperCode
    </a>
  </header>

  <!-- 三、右侧登录面板 -->
  <div class="layout-content">
    <div class="content-card">

      <!-- 4.1 标题 -->
      <h2 class="login-title">欢迎登录</h2>

      <!-- 4.2 Tab -->
      <div class="login-tabs">
        <div class="t active" onclick="switchMode(this,'pw')">密码登录</div>
        <div class="t" onclick="switchMode(this,'sms')">验证码登录</div>
      </div>

      <!-- 4.3 表单 -->
      <form class="login-form-area" onsubmit="event.preventDefault(); location.href='console/dashboard.html';">

        <!-- 密码模式 -->
        <div id="pw-mode">
          <div class="lf-field">
            <div class="lf-input-wrap">
              <select><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="lf-field">
            <div class="lf-input-wrap">
              <input type="password" placeholder="请输入密码" id="pwd-input"/>
              <button type="button" class="field-icon" onclick="togglePwd()">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
                  <circle cx="10" cy="10" r="3"/>
                  <path d="M3 17L17 3" id="pwd-slash" style="display:none;"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="lf-links">
            <span></span>
            <a class="forget" href="#">忘记密码</a>
          </div>
        </div>

        <!-- 验证码模式 -->
        <div id="sms-mode" class="hidden">
          <div class="lf-field">
            <div class="lf-input-wrap">
              <select><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="lf-field">
            <div class="lf-sms-wrap">
              <input type="text" placeholder="请输入验证码"/>
              <button type="button" class="sms-send">发送验证码</button>
            </div>
          </div>
          <div class="lf-links">
            <span></span>
            <a class="forget" href="#">忘记密码</a>
          </div>
        </div>

        <!-- 4.4 登录按钮 -->
        <button type="submit" class="login-btn">登 录</button>
      </form>

      <!-- 4.5 协议 -->
      <p class="login-agreement">登录即代表您同意 SuperCode <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>

      <!-- 4.6 注册引导 -->
      <p class="login-register">没有账号？ <a href="register.html">去注册</a></p>

      <!-- 4.7 产品推广条 -->
      <div class="login-promo">
        <div class="promo-mark">S</div>
        <div class="promo-text">SuperCode 大模型，依托平台强大的基础支撑，提供高效易用的全栈大模型服务</div>
      </div>

    </div>
  </div>

  <!-- 五、底部 Footer -->
  <footer class="layout-footer">
    Copyright © 2026 SuperCode AI Platform, Inc.
  </footer>

</div>

<script>
function switchMode(el, mode) {
  document.querySelectorAll('.login-tabs .t').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pw-mode').classList.toggle('hidden', mode !== 'pw');
  document.getElementById('sms-mode').classList.toggle('hidden', mode !== 'sms');
}
function togglePwd() {
  const inp = document.getElementById('pwd-input');
  const slash = document.getElementById('pwd-slash');
  if (inp.type === 'password') { inp.type = 'text'; slash.style.display = ''; }
  else { inp.type = 'password'; slash.style.display = 'none'; }
}
</script>
</body>
</html>
