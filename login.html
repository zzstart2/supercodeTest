<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · SuperCode</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: #F5F0EE; font-family: var(--font-sans); }

  .login-wrap {
    display: grid;
    grid-template-columns: 1fr 440px;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  /* ===== 顶栏 ===== */
  .login-top {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    z-index: 10;
    position: relative;
  }

  /* ===== 左侧视觉（占满高度）===== */
  .login-left {
    grid-row: 1 / -1;
    grid-column: 1;
    background: linear-gradient(160deg, #FFF1F0 0%, #FFE4E1 25%, #FECDD3 50%, #FDA4AF 80%, #FB7185 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 流体装饰（模拟玻璃丝带） */
  .ribbon {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
  }
  .ribbon::before {
    content: '';
    position: absolute;
    width: 700px;
    height: 260px;
    top: 25%;
    left: 5%;
    background: linear-gradient(135deg,
      rgba(255, 255, 255, 0.6) 0%,
      rgba(228, 46, 46, 0.2) 30%,
      rgba(251, 113, 133, 0.3) 50%,
      rgba(255, 255, 255, 0.5) 70%,
      rgba(244, 63, 94, 0.25) 100%);
    border-radius: 50% 40% 60% 50% / 60% 30% 70% 40%;
    filter: blur(30px);
    transform: rotate(-12deg);
    animation: float 8s ease-in-out infinite alternate;
  }
  .ribbon::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 200px;
    top: 40%;
    left: 15%;
    background: linear-gradient(135deg,
      rgba(255, 255, 255, 0.7) 0%,
      rgba(251, 113, 133, 0.3) 40%,
      rgba(190, 18, 60, 0.15) 60%,
      rgba(255, 255, 255, 0.5) 100%);
    border-radius: 40% 60% 50% 50% / 50% 60% 40% 60%;
    filter: blur(25px);
    transform: rotate(8deg);
    animation: float2 10s ease-in-out infinite alternate;
  }
  @keyframes float {
    0%   { transform: rotate(-12deg) translateY(0); }
    100% { transform: rotate(-8deg) translateY(-20px); }
  }
  @keyframes float2 {
    0%   { transform: rotate(8deg) translateX(0); }
    100% { transform: rotate(12deg) translateX(15px); }
  }

  /* 玻璃光晕层 */
  .glass-orb {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
  }
  .glass-orb:nth-child(1) { width: 350px; height: 350px; top: 8%; left: 10%; }
  .glass-orb:nth-child(2) { width: 250px; height: 250px; bottom: 15%; right: 5%; background: radial-gradient(circle, rgba(228,46,46,0.12) 0%, transparent 70%); }
  .glass-orb:nth-child(3) { width: 180px; height: 180px; top: 50%; left: 55%; background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%); }

  /* 细线环 */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.35);
  }
  .ring:nth-child(4) { width: 400px; height: 400px; top: 12%; left: 8%; }
  .ring:nth-child(5) { width: 280px; height: 280px; top: 30%; left: 35%; border-color: rgba(228,46,46,0.15); }
  .ring:nth-child(6) { width: 200px; height: 200px; bottom: 18%; left: 20%; border-color: rgba(255,255,255,0.25); }

  /* 光点 */
  .sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.7);
  }
  .sparkle:nth-child(7) { top: 20%; left: 30%; width: 6px; height: 6px; }
  .sparkle:nth-child(8) { top: 55%; left: 15%; width: 10px; height: 10px; background: rgba(228,46,46,0.35); }
  .sparkle:nth-child(9) { top: 70%; left: 60%; width: 12px; height: 12px; background: rgba(251,113,133,0.4); }
  .sparkle:nth-child(10) { top: 35%; left: 65%; width: 5px; height: 5px; }

  /* ===== 右侧表单 ===== */
  .login-right {
    grid-row: 2;
    grid-column: 2;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }
  .login-form {
    width: 100%;
    max-width: 340px;
  }
  .login-form h2 {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink-900);
    margin: 0 0 36px;
  }

  /* Tab */
  .l-tabs {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
  }
  .l-tabs .t {
    padding: 8px 0;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink-400);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
  }
  .l-tabs .t.active {
    color: var(--ink-900);
    border-bottom-color: var(--brand);
  }

  /* 输入框（下划线风格） */
  .l-field {
    margin-bottom: 24px;
  }
  .l-input {
    width: 100%;
    padding: 14px 0;
    border: none;
    border-bottom: 1px solid var(--ink-200);
    font-size: 14px;
    color: var(--ink-900);
    background: transparent;
    outline: none;
    transition: border-color 0.15s;
  }
  .l-input:focus { border-bottom-color: var(--brand); }
  .l-input::placeholder { color: var(--ink-400); }

  .l-phone {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--ink-200);
    transition: border-color 0.15s;
  }
  .l-phone:focus-within { border-bottom-color: var(--brand); }
  .l-phone select {
    border: none; background: transparent; font-size: 14px;
    color: var(--ink-700); padding: 14px 8px 14px 0; outline: none;
  }
  .l-phone input {
    flex: 1; border: none; padding: 14px 0; font-size: 14px;
    color: var(--ink-900); background: transparent; outline: none;
  }
  .l-phone input::placeholder { color: var(--ink-400); }

  .l-pwd-wrap {
    position: relative;
  }
  .l-pwd-wrap .eye {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-400);
    padding: 8px;
  }

  .l-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 28px;
    font-size: 13px;
  }
  .l-row a { color: var(--brand); }

  .l-btn {
    width: 100%;
    padding: 14px;
    background: var(--brand);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.15s;
  }
  .l-btn:hover { background: var(--brand-dark); }

  .l-agree {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-400);
    text-align: center;
    line-height: 1.7;
  }
  .l-agree a { color: var(--brand); }

  .l-register {
    margin-top: 32px;
    text-align: center;
    font-size: 14px;
    color: var(--ink-500);
  }
  .l-register a { color: var(--brand); font-weight: 600; text-decoration: underline; }

  .l-brand {
    margin-top: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 20px;
    border-top: 1px solid var(--ink-100);
  }
  .l-brand .mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--brand), #FF6B4A);
    display: grid; place-items: center;
    color: white; font-weight: 700; font-size: 18px;
    flex-shrink: 0;
  }
  .l-brand .desc {
    font-size: 13px; color: var(--ink-500); line-height: 1.55;
  }

  /* SMS */
  .sms-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
    border-bottom: 1px solid var(--ink-200);
    transition: border-color 0.15s;
  }
  .sms-row:focus-within { border-bottom-color: var(--brand); }
  .sms-row input {
    border: none; padding: 14px 0; font-size: 14px;
    color: var(--ink-900); background: transparent; outline: none;
  }
  .sms-row input::placeholder { color: var(--ink-400); }
  .sms-send {
    padding: 8px 14px; margin-bottom: 6px;
    border: 1px solid var(--brand); color: var(--brand);
    background: transparent; border-radius: 6px;
    font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer;
  }
  .sms-send:hover { background: var(--brand-soft); }

  /* 底栏 */
  .login-bottom {
    grid-column: 1 / -1;
    text-align: center;
    padding: 14px;
    font-size: 11px;
    color: var(--ink-400);
  }

  @media (max-width: 900px) {
    .login-wrap { grid-template-columns: 1fr; }
    .login-left { display: none; }
    .login-right { grid-column: 1; }
    .login-top { grid-column: 1; }
    .login-bottom { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <!-- 顶栏 -->
  <div class="login-top">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      SuperCode
    </a>
  </div>

  <!-- 左侧视觉 -->
  <div class="login-left">
    <div class="ribbon"></div>
    <div class="glass-orb"></div>
    <div class="glass-orb"></div>
    <div class="glass-orb"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>

  <!-- 右侧表单 -->
  <div class="login-right">
    <div class="login-form">
      <h2>欢迎登录</h2>

      <div class="l-tabs">
        <div class="t active" onclick="switchMode(this,'pw')">密码登录</div>
        <div class="t" onclick="switchMode(this,'sms')">验证码登录</div>
      </div>

      <form onsubmit="event.preventDefault(); location.href='console/dashboard.html';">
        <!-- 密码模式 -->
        <div id="pw-mode">
          <div class="l-field">
            <div class="l-phone">
              <select><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="l-field">
            <div class="l-pwd-wrap">
              <input class="l-input" type="password" placeholder="请输入密码" id="pwd-input"/>
              <button type="button" class="eye" onclick="togglePwd()">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
                  <circle cx="10" cy="10" r="3"/>
                  <path d="M3 17L17 3" id="pwd-slash" style="display:none;"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="l-row">
            <span></span>
            <a href="#">忘记密码</a>
          </div>
        </div>

        <!-- 验证码模式 -->
        <div id="sms-mode" class="hidden">
          <div class="l-field">
            <div class="l-phone">
              <select><option>+86</option><option>+852</option><option>+65</option><option>+1</option></select>
              <input type="tel" placeholder="请输入手机号" required/>
            </div>
          </div>
          <div class="l-field">
            <div class="sms-row">
              <input type="text" placeholder="请输入验证码"/>
              <button type="button" class="sms-send">发送验证码</button>
            </div>
          </div>
          <div style="height:28px;"></div>
        </div>

        <button type="submit" class="l-btn">登 录</button>
      </form>

      <p class="l-agree">登录即代表您同意 SuperCode <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>

      <p class="l-register">没有账号？ <a href="register.html">去注册</a></p>

      <div class="l-brand">
        <div class="mark">S</div>
        <div class="desc">SuperCode 大模型 API 平台<br/>提供高效易用的全栈大模型服务</div>
      </div>
    </div>
  </div>

  <!-- 底栏 -->
  <div class="login-bottom">
    Copyright © 2026 SuperCode AI Platform, Inc.
  </div>
</div>

<script>
function switchMode(el, mode) {
  document.querySelectorAll('.l-tabs .t').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pw-mode').classList.toggle('hidden', mode !== 'pw');
  document.getElementById('sms-mode').classList.toggle('hidden', mode !== 'sms');
}
function togglePwd() {
  const inp = document.getElementById('pwd-input');
  const slash = document.getElementById('pwd-slash');
  if (inp.type === 'password') { inp.type = 'text'; slash.style.display = ''; }
  else { inp.type = 'password'; slash.style.display = 'none'; }
}
</script>
</body>
</html>
