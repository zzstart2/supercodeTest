<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · SuperCode</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: var(--ink-100); }
  .auth-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .auth-hero {
    background: radial-gradient(ellipse at top left, #1a0a12 0%, #0a0a0f 70%);
    color: white;
    padding: 64px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .auth-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 30% 30%, rgba(228, 46, 46, 0.2) 0%, transparent 50%);
    pointer-events: none;
  }
  .auth-hero .brand { color: white; font-size: 20px; position: relative; z-index: 1; }
  .auth-hero h1 { color: white; font-size: 44px; position: relative; z-index: 1; }
  .auth-hero p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 360px; position: relative; z-index: 1; }
  .auth-hero blockquote {
    margin: 0; padding: 20px 24px;
    border-left: 3px solid var(--brand);
    background: rgba(255,255,255,0.05);
    border-radius: 0 10px 10px 0;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    position: relative; z-index: 1;
  }
  .auth-hero blockquote cite {
    display: block; margin-top: 10px;
    font-style: normal; color: rgba(255,255,255,0.5); font-size: 12px;
  }

  .auth-form-wrap {
    background: white; padding: 64px;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-form { width: 100%; max-width: 400px; }
  .auth-form h2 { font-size: 28px; margin-bottom: 8px; }
  .auth-form .sub { color: var(--ink-500); font-size: 14px; margin-bottom: 32px; }

  .auth-foot {
    text-align: center; margin-top: 24px;
    font-size: 14px; color: var(--ink-500);
  }
  .auth-foot a { color: var(--brand); font-weight: 500; }

  /* 手机号输入组 */
  .phone-input {
    display: flex;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .phone-input:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .phone-input .cc {
    border: none;
    background: var(--ink-100);
    padding: 0 12px;
    font-size: 14px;
    color: var(--ink-700);
    border-right: 1px solid var(--ink-200);
    outline: none;
  }
  .phone-input input {
    flex: 1;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
  }

  .sms-group {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .sms-btn {
    padding: 10px 14px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: white;
    color: var(--brand);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .sms-btn:hover { background: var(--brand-soft); border-color: var(--brand); }

  .tabs-auth {
    display: flex;
    border-bottom: 1px solid var(--ink-200);
    margin-bottom: 24px;
  }
  .tabs-auth .t {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-500);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tabs-auth .t.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
  }

  @media (max-width: 900px) {
    .auth-page { grid-template-columns: 1fr; }
    .auth-hero { display: none; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-hero">
    <a class="brand" href="index.html">
      <span class="brand-mark">S</span>
      SuperCode
    </a>

    <div>
      <h1>欢迎回到<br/>SuperCode 平台</h1>
      <p>继续构建你的 AI 应用。</p>
    </div>

    <blockquote>
      "SuperCode 帮我们在 3 天内把生产环境从 OpenAI 无缝迁移，延迟降低 40%，成本削减 60%。"
      <cite>— xxxxx，xxxxx 产品负责人</cite>
    </blockquote>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <h2>登录账号</h2>
      <p class="sub">使用手机号登录 SuperCode 开发者平台</p>

      <!-- 登录方式切换 -->
      <div class="tabs-auth">
        <div class="t active" onclick="switchLogin(this, 'sms')">验证码登录</div>
        <div class="t" onclick="switchLogin(this, 'pw')">密码登录</div>
      </div>

      <form onsubmit="event.preventDefault(); location.href='console/dashboard.html';">
        <div class="form-field">
          <label>手机号</label>
          <div class="phone-input">
            <select class="cc">
              <option>+86</option>
              <option>+852</option>
              <option>+65</option>
              <option>+60</option>
              <option>+1</option>
            </select>
            <input type="tel" placeholder="请输入手机号" required/>
          </div>
        </div>

        <!-- 验证码模式 -->
        <div id="sms-mode">
          <div class="form-field">
            <label>短信验证码</label>
            <div class="sms-group">
              <input class="input" type="text" placeholder="6 位验证码" required/>
              <button type="button" class="sms-btn">发送验证码</button>
            </div>
          </div>
        </div>

        <!-- 密码模式 -->
        <div id="pw-mode" class="hidden">
          <div class="form-field">
            <label style="display:flex; justify-content:space-between;">
              <span>密码</span>
              <a href="#" style="font-weight:400; font-size:12px; color:var(--brand);">忘记密码？</a>
            </label>
            <input class="input" type="password" placeholder="••••••••"/>
          </div>
        </div>

        <label class="flex" style="font-size:13px; color: var(--ink-700); margin-bottom: 20px;">
          <input type="checkbox"/> 记住我 (14 天)
        </label>

        <button type="submit" class="btn btn-primary btn-block btn-lg">登录</button>
      </form>

      <p class="auth-foot">
        还没有账号？<a href="register.html">立即注册</a>
      </p>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  function switchLogin(el, mode) {
    document.querySelectorAll('.tabs-auth .t').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sms-mode').classList.toggle('hidden', mode !== 'sms');
    document.getElementById('pw-mode').classList.toggle('hidden', mode !== 'pw');
  }
</script>
</body>
</html>
