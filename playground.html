<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-zh="Playground · SenseNova" data-en="Playground · SenseNova">Playground · SenseNova</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: #FAFAFA; }

  /* ===== 三栏布局：模型分类 + 对话区 + 参数 ===== */
  .pg-layout {
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    min-height: calc(100vh - var(--nav-h));
  }

  /* 左侧：模型分类 */
  .pg-left {
    background: white;
    border-right: 1px solid var(--ink-200);
    padding: 24px 12px;
  }
  .pg-left h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-400);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 8px 12px 10px;
  }
  .pg-left h4:not(:first-child) {
    margin-top: 24px;
  }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--ink-700);
    cursor: pointer;
    margin-bottom: 2px;
  }
  .cat-item:hover {
    background: var(--ink-100);
  }
  .cat-item.active {
    background: var(--brand-soft);
    color: var(--brand);
    font-weight: 600;
  }
  .cat-item.disabled {
    color: var(--ink-400);
    cursor: not-allowed;
  }
  .cat-item.disabled:hover {
    background: transparent;
  }
  .cat-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cat-ico {
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    color: var(--ink-400);
    flex-shrink: 0;
  }
  .cat-item:hover .cat-ico { color: var(--ink-700); }
  .cat-item.active .cat-ico { color: var(--brand); }
  .cat-ico .ico { width: 16px; height: 16px; }
  .cat-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 100px;
    background: var(--ink-100);
    color: var(--ink-500);
    font-weight: 500;
  }

  /* 中间：主区 */
  .pg-main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pg-topbar {
    padding: 14px 32px;
    border-bottom: 1px solid var(--ink-200);
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pg-topbar h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
  }

  .billing-tip {
    background: var(--brand-soft);
    border-bottom: 1px solid hsla(245, 84%, 62%, 0.15);
    padding: 10px 32px;
    font-size: 13px;
    color: var(--brand);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .billing-tip .close {
    margin-left: auto;
    color: var(--brand);
    opacity: 0.6;
    cursor: pointer;
    padding: 0 4px;
  }

  /* 居中对话 Hero + 组合输入 */
  .pg-hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 72px 32px 32px;
    overflow-y: auto;
  }

  .pg-hero-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 32px;
    text-align: center;
  }
  .pg-hero-title .accent {
    color: var(--brand);
  }

  /* 组合输入卡片 */
  .composer-card {
    width: 100%;
    max-width: 720px;
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 16px;
    padding: 14px 18px 12px;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .composer-card:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .composer-model-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--ink-100);
    margin-bottom: 12px;
  }

  .model-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px 4px 4px;
    background: var(--ink-100);
    border: 1px solid var(--ink-200);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .model-chip:hover {
    border-color: var(--ink-400);
  }
  .model-chip .dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand) 0%, hsl(239 84% 67%) 100%);
    display: grid;
    place-items: center;
    color: white;
    font-weight: 700;
    font-size: 11px;
  }
  .model-chip .arrow {
    color: var(--ink-400);
    font-size: 10px;
  }

  .mode-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--brand-soft);
    color: var(--brand);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }

  .composer-textarea {
    width: 100%;
    min-height: 92px;
    max-height: 260px;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-900);
    background: transparent;
  }
  .composer-textarea::placeholder {
    color: var(--ink-400);
  }

  .composer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
    border-top: 1px solid var(--ink-100);
  }

  .tool-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--ink-500);
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .tool-btn:hover {
    background: var(--ink-100);
    color: var(--ink-700);
  }
  .tool-btn.disabled {
    color: var(--ink-400);
    cursor: not-allowed;
  }
  .tool-btn.disabled:hover {
    background: transparent;
    color: var(--ink-400);
  }

  .send-btn {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--brand);
    color: white;
    display: grid;
    place-items: center;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .send-btn:hover {
    background: var(--brand-dark);
    transform: translateY(-1px);
  }
  .send-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* 快捷提示 chips */
  .quick-chips {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-width: 720px;
    width: 100%;
    justify-content: center;
  }
  .q-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 100px;
    font-size: 13px;
    color: var(--ink-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .q-chip:hover {
    border-color: var(--brand);
    color: var(--brand);
    background: var(--brand-soft);
  }

  .footer-tip {
    margin-top: auto;
    padding: 16px 32px 20px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-400);
  }

  /* 右侧参数面板 */
  .pg-right {
    background: white;
    border-left: 1px solid var(--ink-200);
    overflow-y: auto;
    padding: 20px;
  }
  .pg-right h4 {
    font-size: 14px;
    color: var(--ink-900);
    margin: 0 0 10px;
    font-weight: 600;
  }
  .pg-right .group { margin-bottom: 20px; }
  .pg-right .group:first-child { margin-top: 0; }

  /* System Prompt */
  .sp-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .sp-head h4 { margin: 0; font-size: 14px; }
  .sp-head .link {
    font-size: 13px;
    color: var(--brand);
    font-weight: 500;
    cursor: pointer;
  }
  .sp-textarea {
    width: 100%;
    min-height: 130px;
    padding: 12px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    font-size: 12.5px;
    font-family: var(--font-mono);
    resize: vertical;
    line-height: 1.55;
    color: var(--ink-700);
  }
  .sp-textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  /* 滑杆 */
  .param-row {
    margin-bottom: 16px;
  }
  .param-row label {
    display: block;
    font-size: 13px;
    color: var(--ink-700);
    margin-bottom: 8px;
  }
  .param-ctrl {
    display: grid;
    grid-template-columns: 1fr 64px;
    gap: 10px;
    align-items: center;
  }
  .param-ctrl input[type="range"] {
    width: 100%;
    accent-color: var(--brand);
  }
  .param-num {
    padding: 6px 10px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius-sm);
    font-size: 13px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    background: white;
  }
  .param-num:focus {
    outline: none;
    border-color: var(--brand);
  }

  @media (max-width: 1100px) {
    .pg-layout { grid-template-columns: 200px 1fr; }
    .pg-right { display: none; }
  }
  @media (max-width: 800px) {
    .pg-layout { grid-template-columns: 1fr; }
    .pg-left { display: none; }
  }
</style>
</head>

<script>
  // 关闭账务提示
  document.querySelectorAll('.billing-tip .close').forEach(c => {
    c.addEventListener('click', e => {
      e.target.closest('.billing-tip').style.display = 'none';
    });
  });

  // 快捷 chip 填充输入框
  document.querySelectorAll('.q-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const ta = document.querySelector('.composer-textarea');
      const label = (chip.querySelector('span:last-child') || chip).textContent.trim();
      const lang = document.documentElement.dataset.lang || 'zh';
      ta.value = lang === 'en'
        ? `Please help me with a「${label}」task:`
        : `请帮我完成「${label}」相关任务：`;
      ta.focus();
    });
  });
</script>
